<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Drill</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon/android-chrome-512x512.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="main-container">
        <div class="grid-container">

            <!-- Column 1: Controls -->
            <div class="col-controls">
                <button class="btn btn-outline-secondary btn-sm w-100" type="button"
                    id="change-sequence-btn">Change</button>
                <button class="btn btn-outline-secondary btn-sm w-100" type="button" id="try-again-btn">Try
                    again</button>
                <button class="btn btn-outline-danger btn-sm w-100" type="button" id="cancel-btn">Cancel</button>
                <button class="btn btn-outline-success btn-sm w-100" type="submit" form="sequence-form"
                    id="drillTextChangeBtn">Save</button>
                <div class="stat-card">
                    <div class="stat-label">target wpm</div>
                    <div class="stat-value" id="wpm-target-value"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">attempts</div>
                    <div class="stat-value" id="wpm-attempts-value"></div>
                </div>
                <button class="btn btn-outline-secondary btn-sm w-100" type="button" id="settings-btn">Settings</button>
            </div>

            <!-- Column 2: Drill area -->
            <div class="col-drill">

                <!-- Row 1: sequence display OR sequence edit -->
                <div class="drill-row-sequence">
                    <!-- drill mode: sequence display -->
                    <div class="sequence-display">
                        <div class="sequence-container"></div>
                    </div>
                    <!-- edit mode: sequence + wpm inputs -->
                    <div class="sequence-edit">
                        <div class="d-flex justify-content-start gap-4 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="inputMethod" id="methodManual"
                                    value="manual" checked>
                                <label class="form-check-label" for="methodManual">Manual</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="inputMethod" id="methodHistory"
                                    value="history">
                                <label class="form-check-label" for="methodHistory">History</label>
                            </div>
                        </div>

                        <form name="sequence-form" id="sequence-form">
                            <div id="manualInputRow" class="d-flex gap-2">
                                <input type="text" class="form-control form-control-sm" id="sequenceText"
                                    name="sequenceText" placeholder="drill sequence..." required>
                                <input class="form-control form-control-sm" id="wpmTarget" name="wpmTarget"
                                    placeholder="wpm" style="width: 65px;" required>
                            </div>

                            <div id="historyControlsRow" class="d-none d-flex flex-wrap align-items-center gap-3">

                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="historyFilter"
                                            id="filterToday" value="today" checked>
                                        <label class="form-check-label" for="filterToday"
                                            style="font-size: 0.85rem;">Today</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="historyFilter" id="filterAll"
                                            value="all">
                                        <label class="form-check-label" for="filterAll"
                                            style="font-size: 0.85rem;">All</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="historyFilter"
                                            id="filterSpaced" value="spaced">
                                        <label class="form-check-label" for="filterSpaced"
                                            style="font-size: 0.85rem;">Spaced</label>
                                    </div>
                                </div>

                                <div style="flex-grow: 1; min-width: 200px;">
                                    <select class="form-control form-control-sm" id="historySelect" name="historySelect"
                                        style="width: 100%;">
                                        <option value="">Search history...</option>
                                    </select>
                                </div>

                                <input class="form-control form-control-sm" id="historyWpmTarget"
                                    name="historyWpmTarget" placeholder="wpm" style="width: 65px;" required>

                                <button type="button" class="btn btn-outline-info btn-sm" id="history-info-btn">
                                    <i class="fa-solid fa-circle-info"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Row 2: typing input -->
                <div class="drill-row-input">
                    <form id="typing-form" name="typing-form">
                        <input type="text" class="form-control" id="typed_text" name="typed_text" autocomplete="off"
                            autocorrect="off" autocapitalize="off" spellcheck="false">
                    </form>
                </div>

                <!-- Row 3: last typed sequence -->
                <div class="drill-row-last-typed">
                    <div class="stat-label">last typed</div>
                    <div id="wpm-last-typed-value"></div>
                </div>

            </div>

            <!-- Column 3: Stats left -->
            <div class="col-stats-left">
                <div class="stat-card">
                    <div class="stat-label">success rate</div>
                    <div class="stat-value" id="wpm-success-rate-value"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">last wpm</div>
                    <div class="stat-value" id="wpm-last-value"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">slowest last</div>
                    <div class="stat-value" id="wpm-slowest-last-value"></div>
                </div>
                <button class="btn btn-outline-secondary btn-sm w-100" type="button" id="info-btn">Info</button>
            </div>

            <!-- Column 4: Stats right -->
            <div class="col-stats-right">
                <div class="stat-card">
                    <div class="stat-label">win streak</div>
                    <div class="stat-value" id="wpm-streak-value"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">best wpm</div>
                    <div class="stat-value" id="wpm-best-value"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">slowest best</div>
                    <div class="stat-value" id="wpm-slowest-best-value"></div>
                </div>
                <button class="btn btn-outline-secondary btn-sm w-100" type="button" id="stats-btn">Stats</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./scripts.js"></script>
</body>

</html>
